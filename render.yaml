services:
  # Backend API Service
  - type: web
    name: sre-ai-os-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true

  # Frontend Web Service
  - type: web
    name: sre-ai-os-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: RENDER_EXTERNAL_URL

  # Daily digest — POSTs new discoveries to the Slack/Discord webhook
  # configured in Settings. Requires a paid Render plan (Cron Jobs aren't
  # available on the free tier). Adjust `schedule` (UTC) as needed.
  - type: cron
    name: sre-ai-os-digest
    env: python
    schedule: "0 13 * * *"
    buildCommand: "true"
    startCommand: "curl -sf -X POST -H \"X-Cron-Secret: $CRON_SECRET\" \"$BACKEND_URL/digest/run\""
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_SECRET
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: CRON_SECRET

  # Weekly reflection agent — reviews recent likes/tags, proposes new
  # learning goals for emerging themes and flags liked-but-never-reviewed
  # "open loops" as AgentSuggestion rows for you to accept/dismiss in the
  # UI (it never creates/changes anything on its own). Also pings the
  # webhook if one's configured. Same paid-plan caveat as the digest above.
  - type: cron
    name: sre-ai-os-reflect
    env: python
    schedule: "0 14 * * 1"
    buildCommand: "true"
    startCommand: "curl -sf -X POST -H \"X-Cron-Secret: $CRON_SECRET\" \"$BACKEND_URL/agent/reflect\""
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_SECRET
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: CRON_SECRET
