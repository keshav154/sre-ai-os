services:
  # Backend API Service
  - type: web
    name: sre-ai-os-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000

  # Frontend Web Service
  - type: web
    name: sre-ai-os-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: RENDER_EXTERNAL_URL

  # Daily digest — POSTs new discoveries to the Slack/Discord webhook
  # configured in Settings. Requires a paid Render plan (Cron Jobs aren't
  # available on the free tier). Adjust `schedule` (UTC) as needed.
  - type: cron
    name: sre-ai-os-digest
    env: python
    schedule: "0 13 * * *"
    buildCommand: "true"
    startCommand: "curl -sf -X POST \"$BACKEND_URL/digest/run\""
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: sre-ai-os-backend
          envVarKey: RENDER_EXTERNAL_URL
